name: CI

on:
  push:
    branches: [main, agent/**]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.22'
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bun run build
